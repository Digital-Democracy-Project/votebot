# Nginx configuration for votebot.digitaldemocracyproject.org
#
# Setup:
# 1. Copy this file to /etc/nginx/sites-available/votebot
# 2. Create symlink: ln -s /etc/nginx/sites-available/votebot /etc/nginx/sites-enabled/
# 3. Test config: nginx -t
# 4. Reload nginx: systemctl reload nginx
# 5. Setup SSL with certbot: certbot --nginx -d votebot.digitaldemocracyproject.org

server {
    listen 80;
    server_name votebot.digitaldemocracyproject.org;

    # Redirect HTTP to HTTPS (certbot will add this automatically)
    # return 301 https://$server_name$request_uri;

    root /var/www/votebot;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Main location - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
