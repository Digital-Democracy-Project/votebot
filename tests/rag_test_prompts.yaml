# VoteBot RAG Test Prompts
# Used to diagnose missing data and validate retrieval quality
#
# Each test case includes:
#   - prompt: The question to ask VoteBot
#   - expected_data: What the response MUST contain (case-insensitive)
#   - data_source: Where this data should come from
#   - category: Type of information being tested
#
# Run with: python scripts/test_rag_quality.py --dry-run
#           python scripts/test_rag_quality.py --verbose

# =============================================================================
# FLORIDA BILL TESTS - HB 363 Dental Therapy
# =============================================================================
fl_hb363_tests:
  - id: fl_hb363_summary
    prompt: "What is Florida HB 363 about?"
    expected_data:
      - "dental"
      - "therapy"
    data_source: webflow_cms
    category: bill_summary

  - id: fl_hb363_status
    prompt: "What is the current status of Florida HB 363?"
    expected_data:
      - "2026"
    data_source: openstates
    category: bill_status

  - id: fl_hb363_sponsor
    prompt: "Who sponsored Florida HB 363 Dental Therapy?"
    expected_data:
      - "sponsor"
    data_source: openstates
    category: bill_sponsor

  - id: fl_hb363_history
    prompt: "What is the legislative history of Florida HB 363?"
    expected_data:
      - "filed"
    data_source: openstates
    category: legislative_history

  - id: fl_hb363_text
    prompt: "What does the bill text of Florida HB 363 say about licensing?"
    expected_data:
      - "dental"
    data_source: pdf_text
    category: bill_text

