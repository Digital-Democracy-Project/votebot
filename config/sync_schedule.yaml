# VoteBot Sync Schedule Configuration
# ====================================
#
# Controls when bills, legislators, and organizations are synced.
# Activated by setting SCHEDULER_ENABLED=true in the environment.
# In multi-worker deployments, only one worker runs the scheduler
# (Redis-based leader election).
#
# Schedule Summary:
# - Bills:         Daily at 04:00 UTC (session-aware — daily in session, weekly off)
# - Legislators:   Weekly on Sundays at 06:00 UTC
# - Organizations: Monthly on the 1st at 08:00 UTC
# - Content poll:  Hourly (Congress/OpenStates change detection)
#
# Session Detection:
# - Primary: Live session dates from OpenStates API (fetched via warm_cache()
#   during bill sync — uses existing OpenStatesSource.fetch_jurisdiction())
# - Fallback: Hardcoded heuristics in StateLegislativeCalendar (start pattern
#   + duration in weeks for all 50 states)

# Global settings
sync_time_utc: "04:00"  # When to run daily bill sync (4 AM UTC = 11 PM EST)

# Federal Congress settings (not covered by StateLegislativeCalendar)
US:
  enabled: true
  frequency: daily
  congress_number: 119        # 119th Congress (2025-2027)
  session_years: "2025-2027"

# DDP Active Jurisdictions (seed list)
# New states are auto-tracked when bills are synced via the unified sync API.
# The canonical set is maintained in Redis (votebot:active_jurisdictions).
# This list seeds the Redis set and serves as documentation of initial states.
active_jurisdictions:
  - FL   # Florida
  - VA   # Virginia
  - WA   # Washington
  - UT   # Utah
  - AZ   # Arizona
  - MI   # Michigan
  - MA   # Massachusetts

# Jurisdiction Overrides
# Use this section to customize sync behavior for specific states.
# If not listed here, the default behavior applies:
#   - In session: sync daily
#   - Off session: sync weekly (Mondays only)
#   - Biennial off-year: no sync
overrides:
  # Example: Disable a jurisdiction temporarily
  # NV:
  #   enabled: false
  #   reason: "Not yet supported in DDP"

  # Example: Force weekly sync even during session
  # CA:
  #   frequency: weekly
  #   reason: "High volume, reduce API calls"

# Rate Limiting
# OpenStates API Tier: 30,000 calls/day, 2 calls/second
# 2 calls/sec = 120 requests/minute = 500ms minimum between requests
rate_limit:
  requests_per_minute: 120
  delay_between_bills_ms: 500

# Retry Configuration
retry:
  max_attempts: 3
  backoff_seconds: 5

# Legislator Sync Configuration
# Syncs sponsored bills and voting records for each legislator from OpenStates.
# Runs weekly to spread API usage. Uses date-based rotation to cycle through
# all legislators over multiple runs (max_legislators_per_run per week).
legislator_sync:
  enabled: true
  sync_time_utc: "06:00"  # 6 AM UTC = 1 AM EST (2 hours after bill sync)
  frequency: weekly        # Weekly sync to conserve API quota
  sync_day: sunday         # Run on Sundays
  # Rate limiting (aligned with API tier: 2 calls/second)
  delay_between_legislators_ms: 500   # 500ms between legislators (2 calls/sec)
  max_legislators_per_run: 200        # Rotate through full list across weeks

  # Sponsored bills sync
  sync_sponsored_bills: true

  # Voting record sync
  sync_votes: true
  max_vote_bills_per_legislator: 200  # Max bills to check for votes per legislator
  vote_session: null                   # null = current session, or specify e.g. "2026"

# Legacy alias (deprecated, use legislator_sync instead)
legislator_bills:
  enabled: false  # Disabled — superseded by legislator_sync above
  sync_time_utc: "06:00"
  frequency: weekly
  sync_day: sunday
  delay_between_legislators_ms: 500
  max_legislators_per_run: 200

# Organization Sync Configuration
# Re-ingests all organization profiles from Webflow CMS.
# Monthly is sufficient since org data changes infrequently.
organization_sync:
  enabled: true
  sync_time_utc: "08:00"  # 8 AM UTC = 3 AM EST (4 hours after bill sync)
  day_of_month: 1          # 1st of each month

# Notification Settings (future use)
notifications:
  on_failure: true
  on_large_changes: true  # Alert if >100 bills updated
  email: ""  # Configure if needed
